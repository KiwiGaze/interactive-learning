name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: [20, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm --filter @interactive-learning/ui build
      - run: pnpm --filter @interactive-learning/mcp-server build
      - name: Install Playwright browsers
        if: matrix.os == 'ubuntu-latest' && matrix.node == 22
        run: pnpm --filter @interactive-learning/e2e exec playwright install --with-deps chromium
      - name: E2E tests
        if: matrix.os == 'ubuntu-latest' && matrix.node == 22
        run: pnpm --filter @interactive-learning/e2e test:e2e
